<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trustee Web</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; }
    body {
      font-family: 'SF Mono', 'Monaco', 'Cascadia Code', 'Courier New', monospace;
      background: #0e0e0e;
      color: #e0e0e0;
      height: 100vh;
      height: 100dvh; /* dynamic viewport height — adjusts for keyboard on mobile */
      display: flex;
      flex-direction: column;
    }
    #output {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .line { padding: 0; }
    /* Empty lines must take up vertical space */
    .line:empty { min-height: 0.8em; }
    .msg-user {
      display: flex;
      justify-content: flex-end;
      margin: 8px 0;
    }
    .msg-user .bubble {
      background: #2563eb;
      color: #fff;
      padding: 8px 14px;
      border-radius: 12px 12px 4px 12px;
      max-width: 85%;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    @media (max-width: 600px) {
      .msg-user .bubble { max-width: 90%; font-size: 15px; }
    }
    .error { color: #f87171; }
    .success { color: #4ade80; }
    .info { color: #60a5fa; }
    .warn { color: #fbbf24; }
    #input-bar {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      background: #1a1a1a;
      border-top: 1px solid #333;
    }
    #input {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 14px;
      outline: none;
    }
    #input:focus { border-color: #555; }
    #input::placeholder { color: #555; }
    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 18px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: #3b82f6; }
    button:disabled { background: #1e3a5f; cursor: not-allowed; opacity: 0.6; }
    button.danger { background: #dc2626; }
    button.danger:hover { background: #ef4444; }
    #status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      font-size: 12px;
    }
    #state { color: #888; }
    #state.running { color: #fbbf24; }
    #state.cancelling { color: #f87171; }
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #444;
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #right-panel {
      width: 280px;
      border-left: 1px solid #333;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #main-area { display: flex; flex: 1; overflow: hidden; }
    #todo-panel, #mcp-panel {
      padding: 10px 12px;
      font-size: 12px;
      overflow-y: auto;
    }
    #todo-panel { flex: 1; }
    #mcp-panel { border-top: 1px solid #333; max-height: 40%; }
    .panel-title {
      font-weight: bold; color: #aaa; margin-bottom: 6px;
      font-size: 11px; text-transform: uppercase;
      cursor: pointer; user-select: none;
      display: flex; align-items: center; gap: 4px;
    }
    .panel-title:hover { color: #ccc; }
    .panel-toggle { font-size: 10px; }
    .panel-content.collapsed { display: none; }

    /* Mobile: full-screen output, panel becomes slide-up bottom sheet */
    @media (max-width: 600px) {
      #output { font-size: 15px; padding: 8px 10px; line-height: 1.6; }
      #input { font-size: 16px; padding: 8px 10px; }
      #input-bar { padding: 6px 10px; }
      button { padding: 8px 14px; font-size: 14px; }

      /* Panel becomes bottom sheet overlay */
      #right-panel {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        max-height: 60vh;
        border-left: none;
        border-top: 1px solid #333;
        background: #1a1a1a;
        z-index: 1000;
        transform: translateY(100%);
        transition: transform 0.25s ease-out;
        box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
        border-radius: 12px 12px 0 0;
        flex-direction: column;
      }
      #right-panel.open { transform: translateY(0); }

      /* Slide-up handle bar */
      #sheet-handle {
        display: block;
        width: 36px;
        height: 4px;
        background: #555;
        border-radius: 2px;
        margin: 8px auto 4px;
        flex-shrink: 0;
      }

      /* Tab bar inside the sheet */
      #panel-tabs {
        display: flex;
        gap: 0;
        background: #111;
        border-radius: 8px;
        margin: 0 8px 4px;
        flex-shrink: 0;
      }
      .tab-btn {
        flex: 1; padding: 8px; text-align: center;
        font-size: 11px; cursor: pointer; border: none;
        background: #111; color: #888; font-family: inherit;
        border-bottom: 2px solid transparent;
        border-radius: 8px;
      }
      .tab-btn.active { color: #60a5fa; border-bottom-color: #60a5fa; }
      #tab-collapse { flex: 0 0 auto; padding: 8px 14px; }

      /* Panel content scrollers */
      #todo-panel, #mcp-panel { padding: 8px 12px; overflow-y: auto; }
      #todo-panel { flex: 1; }
      #mcp-panel { flex: 1; }

      /* Show only active tab */
      #right-panel.mobile-mode #todo-panel { display: none; }
      #right-panel.mobile-mode.tab-todo #todo-panel { display: block; }
      #right-panel.mobile-mode.tab-mcp #mcp-panel { display: block; }
      #right-panel.mobile-mode #mcp-panel { display: none; }

      /* Backdrop to dismiss the sheet */
      #sheet-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 999;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s;
      }
      #sheet-backdrop.visible {
        opacity: 1;
        pointer-events: auto;
      }

      /* Floating action button to open the sheet */
      #fab-panel {
        position: fixed;
        right: 12px;
        bottom: 60px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: #2563eb;
        color: white;
        border: none;
        cursor: pointer;
        z-index: 100;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 12px rgba(0,0,0,0.4);
        transition: background 0.2s, transform 0.2s;
      }
      #fab-panel:hover { background: #3b82f6; transform: scale(1.05); }
      #fab-panel:active { transform: scale(0.95); }
    }

    /* Desktop: hide mobile-only elements (must be in min-width query so the
       mobile @media rules above aren't overridden by later source order) */
    @media (min-width: 601px) {
      #panel-tabs { display: none; }
      #sheet-handle { display: none; }
      #sheet-backdrop { display: none; }
      #fab-panel { display: none; }
    }
    .todo-item { padding: 2px 0; }
    .mcp-item { padding: 2px 0; }
    .mcp-ok { color: #4ade80; }
    .mcp-fail { color: #f87171; }
    .tool-line { color: #60a5fa; }
    .tool-line.success { color: #4ade80; }
    .tool-line.error { color: #f87171; }
    .tool-spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid #444;
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #161616;
      border-bottom: 1px solid #333;
    }
    #header h1 { font-size: 14px; color: #ccc; }
    .context-badge { font-size: 11px; color: #888; }
  </style>
</head>
<body>

<div id="header">
  <h1>🤖 Trustee</h1>
  <span class="context-badge" id="context-tokens">0 tokens</span>
  <span class="context-badge" id="user-badge" style="display:none; cursor:pointer;" title="Click to logout"></span>
</div>

<div id="status-bar">
  <span id="state">Idle</span>
  <span id="spinner-container"></span>
  <button id="btn-cancel" class="danger" style="display:none; padding: 4px 12px; font-size: 12px;">Cancel</button>
  <button id="btn-handoff" style="display:none; padding: 4px 12px; font-size: 12px;">Handoff</button>
</div>

<div id="sheet-backdrop"></div>

<div id="main-area">
  <div id="output"></div>
  <div id="right-panel">
    <div id="sheet-handle"></div>
    <div id="panel-tabs">
      <button class="tab-btn active" id="tab-todo">📋 Todos</button>
      <button class="tab-btn" id="tab-mcp">🔌 MCP</button>
      <button class="tab-btn" id="tab-collapse">✕</button>
    </div>
    <div id="todo-panel">
      <div class="panel-title" id="todo-title">Todos</div>
      <div id="todo-list">No tasks</div>
    </div>
    <div id="mcp-panel">
      <div class="panel-title" id="mcp-title">MCP Servers</div>
      <div id="mcp-list">(none)</div>
    </div>
  </div>
</div>

<button id="fab-panel">📋</button>

<div id="input-bar">
  <input id="input" type="text" placeholder="Type a task and press Enter..." autocomplete="off" />
  <button id="btn-send">Send</button>
</div>

<script>
const API = window.location.origin;
let ws = null;
let autoScroll = true;

// --- Output rendering ---
const outputEl = document.getElementById('output');

function classifyLine(text) {
  if (text.startsWith('\x01')) return { text: text.slice(1), cls: 'reasoning' };
  if (text.startsWith('✗') || text.startsWith('❌')) return { text, cls: 'error' };
  if (text.startsWith('✓') || text.startsWith('✅')) return { text, cls: 'success' };
  if (text.startsWith('🔥') || text.startsWith('📡') || text.startsWith('🚀')) return { text, cls: 'info' };
  if (text.startsWith('⏹') || text.startsWith('⏳') || text.startsWith('🔄') || text.startsWith('🔀')) return { text, cls: 'warn' };
  return { text, cls: '' };
}

function renderLines(lines) {
  outputEl.innerHTML = '';
  for (const line of lines) {
    // User messages stored as "> text" → render as chat bubble
    if (line.startsWith('> ')) {
      const wrap = document.createElement('div');
      wrap.className = 'msg-user';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = line.slice(2);
      wrap.appendChild(bubble);
      outputEl.appendChild(wrap);
      continue;
    }
    const { text, cls } = classifyLine(line);
    const div = document.createElement('div');
    div.className = 'line' + (cls ? ' ' + cls : '');
    div.textContent = text;
    outputEl.appendChild(div);
  }
  if (autoScroll) outputEl.scrollTop = outputEl.scrollHeight;
}

// --- WebSocket streaming ---
function connectWS() {
  const wsUrl = (API.startsWith('https') ? 'wss' : 'ws') + '://' + window.location.host + '/api/v1/session/stream';
  ws = new WebSocket(wsUrl);

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    handleMessage(msg);
  };

  ws.onclose = () => {
    setTimeout(() => { if (!ws || ws.readyState === WebSocket.CLOSED) connectWS(); }, 2000);
  };

  ws.onerror = () => { ws.close(); };
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'OutputLine':
      appendOutput(msg.line);
      break;
    case 'StreamDelta':
      appendDelta(msg.delta);
      break;
    case 'ReasoningDelta':
      appendDelta(msg.delta, true);
      break;
    case 'WorkflowCompleted':
      updateState('Idle');
      break;
    case 'WorkflowError':
      updateState('Idle');
      break;
    case 'WorkflowCancelled':
      updateState('Idle');
      break;
    case 'TodoUpdate':
      renderTodos(msg.content);
      break;
    case 'ToolPending':
      appendToolPending(msg.tool_name, msg.hint);
      break;
    case 'ToolDone':
      updateToolDone(msg.tool_name, msg.success, msg.hint);
      break;
    case 'ContextTokensUpdated':
      document.getElementById('context-tokens').textContent = msg.count.toLocaleString() + ' tokens';
      break;
    case 'McpServerStatus':
      refreshSession();
      break;
    case 'ResumeInfo':
      // ResumeInfo is a mid-execution checkpoint, NOT a completion signal.
      // ABK sends these after each iteration while the workflow is still running.
      // Do NOT change the UI state — only the final WorkflowCompleted/Error
      // messages signal the actual end.
      break;
    case 'HandoffReady':
      updateState('Idle');
      break;
    case 'WorkflowStarted':
    case 'StateChanged':
      if (msg.state) updateState(msg.state);
      break;
  }
}

function appendOutput(line) {
  const { text, cls } = classifyLine(line);
  const div = document.createElement('div');
  div.className = 'line' + (cls ? ' ' + cls : '');
  div.textContent = text;
  outputEl.appendChild(div);
  if (autoScroll) outputEl.scrollTop = outputEl.scrollHeight;
}

// --- Tool call rendering ---
// Track pending tool lines by name for ToolDone replacement.
const pendingToolElements = [];

function appendToolPending(toolName, hint) {
  const label = hint ? `${toolName} ${hint}` : toolName;
  const div = document.createElement('div');
  div.className = 'line tool-line';
  div.innerHTML = `<span class="tool-spinner"></span>${label}`;
  outputEl.appendChild(div);
  pendingToolElements.push({ toolName, element: div });
  if (autoScroll) outputEl.scrollTop = outputEl.scrollHeight;
}

function updateToolDone(toolName, success, hint) {
  // Find the first pending entry for this tool name
  const idx = pendingToolElements.findIndex(e => e.toolName === toolName);
  if (idx >= 0) {
    const { element: div } = pendingToolElements.splice(idx, 1)[0];
    const status = success ? '✓' : '✗';
    const label = hint ? `${status} ${toolName} ${hint}` : `${status} ${toolName}`;
    div.className = 'line tool-line ' + (success ? 'success' : 'error');
    div.textContent = label;
  } else {
    // No pending entry — append directly
    const status = success ? '✓' : '✗';
    const label = hint ? `${status} ${toolName} ${hint}` : `${status} ${toolName}`;
    const div = document.createElement('div');
    div.className = 'line tool-line ' + (success ? 'success' : 'error');
    div.textContent = label;
    outputEl.appendChild(div);
  }
  if (autoScroll) outputEl.scrollTop = outputEl.scrollHeight;
}

function appendDelta(delta, isReasoning) {
  const last = outputEl.lastElementChild;
  if (last) {
    if (isReasoning && !last.classList.contains('reasoning')) {
      const div = document.createElement('div');
      div.className = 'line reasoning';
      div.textContent = delta;
      outputEl.appendChild(div);
    } else {
      last.textContent += delta;
    }
  } else {
    const div = document.createElement('div');
    div.className = 'line' + (isReasoning ? ' reasoning' : '');
    div.textContent = delta;
    outputEl.appendChild(div);
  }
  if (autoScroll) outputEl.scrollTop = outputEl.scrollHeight;
}

// --- Session state ---
async function refreshSession() {
  try {
    const res = await fetch(API + '/api/v1/session');
    if (!res.ok) return;
    const data = await res.json();
    renderLines(data.output_lines || []);
    updateState(data.workflow_state || 'Idle');
    renderTodosRaw(data.todo_lines || []);
    renderMcp(data.mcp_servers || []);
    if (data.context_tokens) {
      document.getElementById('context-tokens').textContent = data.context_tokens.toLocaleString() + ' tokens';
    }
  } catch(e) { /* server starting */ }
}

function renderTodos(content) {
  const lines = content.split('\n').filter(l => l.trim());
  renderTodosRaw(lines);
}

function renderTodosRaw(lines) {
  const el = document.getElementById('todo-list');
  if (!lines.length) { el.textContent = 'No tasks'; return; }
  el.innerHTML = '';
  for (const l of lines) {
    const d = document.createElement('div');
    d.className = 'todo-item';
    d.textContent = l;
    el.appendChild(d);
  }
}

function renderMcp(servers) {
  const el = document.getElementById('mcp-list');
  if (!servers.length) { el.textContent = '(none)'; return; }
  el.innerHTML = '';
  for (const s of servers) {
    const d = document.createElement('div');
    d.className = 'mcp-item';
    d.innerHTML = `<span class="${s.connected ? 'mcp-ok' : 'mcp-fail'}">${s.connected ? '✓' : '✗'}</span> ${s.name} <span style="color:#888">${s.tool_count} tools</span>`;
    el.appendChild(d);
  }
}

function updateState(state) {
  const el = document.getElementById('state');
  el.textContent = state;
  el.className = state.toLowerCase();
  const running = state === 'Running';
  const cancelling = state === 'Cancelling';
  document.getElementById('spinner-container').innerHTML = running ? '<span class="spinner"></span>' : '';
  document.getElementById('btn-cancel').style.display = running ? '' : 'none';
  document.getElementById('btn-handoff').style.display = (running || cancelling) ? '' : 'none';
  document.getElementById('btn-send').disabled = running || cancelling;
  document.getElementById('input').disabled = running || cancelling;
}

// --- Actions ---
async function sendCommand() {
  const input = document.getElementById('input');
  const cmd = input.value.trim();
  if (!cmd) return;
  input.value = '';
  // Disable input immediately while server confirms and broadcasts state change
  document.getElementById('btn-send').disabled = true;
  document.getElementById('input').disabled = true;

  await fetch(API + '/api/v1/session/command', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ command: cmd }),
  });
  // State change is now broadcast via WebSocket (StateChanged message)
  // so we don't call updateState('Running') here — avoids race conditions
  // where a WorkflowCompleted arrives before this point.
  // Clear output for new session
  if (!window._hasSession) {
    outputEl.innerHTML = '';
    window._hasSession = true;
  }
  // Render user message as a chat bubble (right-aligned, boxed)
  const wrap = document.createElement('div');
  wrap.className = 'msg-user';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = cmd;
  wrap.appendChild(bubble);
  outputEl.appendChild(wrap);
  if (autoScroll) outputEl.scrollTop = outputEl.scrollHeight;
}

async function cancelWorkflow() {
  await fetch(API + '/api/v1/session/cancel', { method: 'POST' });
}

async function doHandoff() {
  await fetch(API + '/api/v1/session/handoff', { method: 'POST' });
}

// --- Event listeners ---
document.getElementById('btn-send').addEventListener('click', sendCommand);
document.getElementById('btn-cancel').addEventListener('click', cancelWorkflow);
document.getElementById('btn-handoff').addEventListener('click', doHandoff);
document.getElementById('input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendCommand();
});

outputEl.addEventListener('scroll', () => {
  autoScroll = (outputEl.scrollTop + outputEl.clientHeight >= outputEl.scrollHeight - 4);
});

// --- Auth ---
async function checkAuth() {
  try {
    const res = await fetch(API + '/auth/me');
    const data = await res.json();
    if (data.auth_enabled && !data.authenticated) {
      // Auth required but not authenticated — redirect to login
      window.location.href = API + '/auth/login';
      return false;
    }
    if (data.authenticated && data.name) {
      const badge = document.getElementById('user-badge');
      badge.textContent = (data.dev_mode ? '🔧 ' : '') + data.name;
      badge.style.display = '';
      badge.onclick = async () => {
        await fetch(API + '/auth/logout', { method: 'POST' });
        window.location.reload();
      };
    }
    return true;
  } catch(e) {
    // Server might not have auth — continue normally
    return true;
  }
}

// --- Desktop: collapsible panels ---
const rightPanel = document.getElementById('right-panel');
const sheetBackdrop = document.getElementById('sheet-backdrop');
const fabPanel = document.getElementById('fab-panel');

// Desktop: click panel title to collapse/expand individual panels
function setupPanelToggle(titleId, contentSelector) {
  const title = document.getElementById(titleId);
  if (!title) return;
  title.addEventListener('click', () => {
    const content = title.nextElementSibling;
    if (content) content.classList.toggle('collapsed');
    title.querySelector('.panel-toggle')?.remove();
    const indicator = document.createElement('span');
    indicator.className = 'panel-toggle';
    indicator.textContent = content?.classList.contains('collapsed') ? '▸' : '▾';
    title.appendChild(indicator);
  });
  // Init indicator
  const indicator = document.createElement('span');
  indicator.className = 'panel-toggle';
  indicator.textContent = '▾';
  title.appendChild(indicator);
}
setupPanelToggle('todo-title', '#todo-list');
setupPanelToggle('mcp-title', '#mcp-list');

// --- Mobile: bottom sheet panel ---

function isMobile() { return window.innerWidth <= 600; }

function openSheet() {
  rightPanel.classList.add('open');
  sheetBackdrop.classList.add('visible');
}

function closeSheet() {
  rightPanel.classList.remove('open');
  sheetBackdrop.classList.remove('visible');
}

function initMobile() {
  if (!isMobile()) return;
  rightPanel.classList.add('mobile-mode', 'tab-todo');
}
initMobile();

// FAB opens the sheet
fabPanel.addEventListener('click', openSheet);

// Backdrop dismisses the sheet
sheetBackdrop.addEventListener('click', closeSheet);

// Tab switching
document.getElementById('tab-todo')?.addEventListener('click', () => {
  rightPanel.classList.add('mobile-mode', 'tab-todo');
  rightPanel.classList.remove('tab-mcp');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-todo')?.classList.add('active');
});

document.getElementById('tab-mcp')?.addEventListener('click', () => {
  rightPanel.classList.add('mobile-mode', 'tab-mcp');
  rightPanel.classList.remove('tab-todo');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-mcp')?.classList.add('active');
});

// Close button inside the sheet
document.getElementById('tab-collapse')?.addEventListener('click', closeSheet);

// Re-evaluate on orientation/size change
window.addEventListener('resize', () => {
  if (!isMobile()) {
    rightPanel.classList.remove('mobile-mode', 'tab-todo', 'tab-mcp', 'open');
    sheetBackdrop.classList.remove('visible');
  } else {
    initMobile();
  }
});

// --- Mobile keyboard handling ---
// 100dvh handles most modern browsers, but visualViewport is needed
// for older Android browsers where the keyboard overlaps content.
if (window.visualViewport) {
  const handleViewport = () => {
    document.body.style.height = window.visualViewport.height + 'px';
  };
  window.visualViewport.addEventListener('resize', handleViewport);
  window.visualViewport.addEventListener('scroll', handleViewport);
  handleViewport();
}

// Focus input on tap in empty output area (mobile UX)
outputEl.addEventListener('click', () => {

});
